<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Valpeca | Administración y gestión de activos</title>
    <meta
      name="description"
      content="Valpeca, administración y gestión de activos. Gestionamos y optimizamos tu patrimonio con un enfoque profesional y a largo plazo."
    />
    <meta
      name="keywords"
      content="Valpeca, gestión de activos, administración de activos, gestión patrimonial, asset management"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Valpeca" />
    <link rel="canonical" href="https://valpeca.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Valpeca" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:title" content="Valpeca | Administración y gestión de activos" />
    <meta
      property="og:description"
      content="Administración y gestión de activos con un enfoque profesional y a largo plazo."
    />
    <meta property="og:url" content="https://valpeca.com/" />
    <meta property="og:image" content="https://valpeca.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Valpeca — Administración y gestión de activos" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Valpeca | Administración y gestión de activos" />
    <meta
      name="twitter:description"
      content="Administración y gestión de activos con un enfoque profesional y a largo plazo."
    />
    <meta name="twitter:image" content="https://valpeca.com/og.png" />

    <meta name="theme-color" content="#000000" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Datos estructurados (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Valpeca",
        "description": "Administración y gestión de activos.",
        "url": "https://valpeca.com/",
        "email": "contacto@valpeca.com",
        "image": "https://valpeca.com/og.png",
        "areaServed": "ES",
        "knowsLanguage": "es"
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap"
      rel="stylesheet"
    />
    <!-- El CSS lo inyecta Vite desde el import en src/main.js (con hash de caché). -->
  </head>
  <body class="bg-black text-white antialiased">
    <!-- Lienzo a pantalla completa para el shader -->
    <div id="shader" class="fixed inset-0 -z-10 h-screen w-full overflow-hidden bg-black"></div>

    <!-- Contenido encima del shader -->
    <main class="relative z-10 flex min-h-screen flex-col items-center justify-center px-6 text-center">
      <h1
        id="title"
        class="cursor-default font-['Unica_One'] text-6xl tracking-widest sm:text-8xl"
      >
        VALPECA
      </h1>
      <p class="mt-4 max-w-md text-balance text-sm text-white/60 sm:text-base">
        Administración y gestión de activos
      </p>
      <a
        href="mailto:contacto@valpeca.com"
        class="mt-6 text-sm text-white/80 transition-colors hover:text-white sm:text-base"
      >
        contacto@valpeca.com
      </a>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
